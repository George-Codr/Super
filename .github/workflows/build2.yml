name: Build Python for Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    env:
      TERMUX_ON_DEVICE_BUILD: false
      TERMUX_ARCH: arm64
      TERMUX_PKG_API_LEVEL: 35

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          brew install wget unzip git make pkg-config clang automake autoconf

      - name: Setup Android SDK
        run: |
          SDK_ROOT="${{ github.workspace }}/android-sdk"
          mkdir -p "$SDK_ROOT/cmdline-tools"
          cd "$SDK_ROOT"
          wget https://dl.google.com/android/repository/commandlinetools-mac-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d "$SDK_ROOT/cmdline-tools"
          rm cmdline-tools.zip
          export PATH="$SDK_ROOT/cmdline-tools/bin:$PATH"
          sdkmanager --sdk_root="$SDK_ROOT" "platform-tools" "platforms;android-35" "build-tools;35.0.0" "ndk;27.3.13750724" --install

      - name: Setup Android NDK
        run: |
          SDK_ROOT="${{ github.workspace }}/android-sdk"
          NDK_PATH=$(find "$SDK_ROOT/ndk" -maxdepth 1 -type d | sort -r | head -n 1)
          echo "NDK found at $NDK_PATH"
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV

      - name: Make build.sh executable
        run: chmod +x ./build.sh

      - name: Build Python
        run: |
          PREFIX="${{ github.workspace }}/prefix"
          mkdir -p "$PREFIX"
          export PREFIX
          ./build.sh

      - name: List Built Files
        run: |
          PREFIX="${{ github.workspace }}/prefix"
          echo "Built Python files in $PREFIX/bin:"
          ls -l "$PREFIX/bin"
