name: Build Python for Android

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-14
    env:
      ANDROID_HOME: ${{ github.workspace }}/android-sdk
      PREFIX: ${{ github.workspace }}/prefix
      ANDROID_SDK_VERSION: 35
      ANDROID_BUILD_TOOLS: 35.0.0
      ANDROID_NDK_VERSION: 27.3.13750724
      TERMUX_ARCH: arm64
      TERMUX_PKG_API_LEVEL: 35

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          brew install wget curl git unzip make pkg-config automake libtool m4 coreutils gawk xz openssl sqlite readline zlib libffi
          export PATH="/opt/homebrew/opt/automake/bin:$PATH"
          export PATH="/opt/homebrew/opt/libtool/bin:$PATH"
          export PATH="/opt/homebrew/opt/m4/bin:$PATH"
          echo "/opt/homebrew/opt/coreutils/libexec/gnubin" >> $GITHUB_PATH || true
          xcode-select --install || echo "Xcode CLI tools already installed"

      - name: Install Autoconf 2.71
        run: |
          which autoconf
          curl -O https://ftp.gnu.org/gnu/autoconf/autoconf-2.71.tar.gz
          tar xf autoconf-2.71.tar.gz
          cd autoconf-2.71
          ./configure --prefix=$HOME/.local
          make -j$(sysctl -n hw.logicalcpu)
          make install
          export PATH="$HOME/.local/bin:$PATH"
          autoconf --version
      - name: Download Android command line tools
        run: |
          set -euxo pipefail
          mkdir -p "$ANDROID_HOME"
          cd "$ANDROID_HOME"

          wget https://dl.google.com/android/repository/commandlinetools-mac-9477386_latest.zip -O tools.zip
          unzip -q tools.zip
          rm tools.zip

          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true

          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Accept SDK licenses
        run: |
          yes | sdkmanager --sdk_root="$ANDROID_HOME" --licenses

      - name: Install Android NDK
        run: |
          set -euxo pipefail
          mkdir -p $ANDROID_HOME
          sdkmanager \
            "platform-tools" \
            "platforms;android-${ANDROID_SDK_VERSION}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}"
          echo "✅ Android NDK ${ANDROID_NDK_VERSION} installed."
          ls -1 "$ANDROID_HOME/ndk/"

      - name: Set environment to use SDK/NDK Clang
        run: |
          set -euxo pipefail

          NDK_PATH="$ANDROID_HOME/ndk/${ANDROID_NDK_VERSION}"
          ARCH=$(uname -m)
          ls $NDK_PATH/toolchains
          ls $NDK_PATH/toolchains/llvm
          ls $NDK_PATH/toolchains/llvm/prebuilt

          if [ "$ARCH" = "x86_64" ] && [ -d "$NDK_PATH/toolchains/llvm/prebuilt/darwin-x86_64" ]; then
            TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt/darwin-x86_64"
          elif [ "$ARCH" = "arm64" ] && [ -d "$NDK_PATH/toolchains/llvm/prebuilt/darwin-arm64" ]; then
            TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt/darwin-arm64"
          else
            echo "⚠️ NDK toolchain not found; using system clang"
            TOOLCHAIN="/usr"
          fi
          export SYSROOT=$TOOLCHAIN/sysroot
          echo "Using TOOLCHAIN: $TOOLCHAIN"

          echo "$TOOLCHAIN/bin" >> $GITHUB_PATH
          ls $TOOLCHAIN/bin

          if [ -x "$TOOLCHAIN/bin/aarch64-linux-android35-clang" ]; then
            echo "CC=$TOOLCHAIN/bin/aarch64-linux-android35-clang --sysroot=$SYSROOT" >> $GITHUB_ENV
            echo "CXX=$TOOLCHAIN/bin/aarch64-linux-android35-clang++ --sysroot=$SYSROOT" >> $GITHUB_ENV
          else
            echo "CC=$(command -v clang)" >> $GITHUB_ENV
            echo "CXX=$(command -v clang++)" >> $GITHUB_ENV
          fi

          echo "AR=$TOOLCHAIN/bin/llvm-ar" >> $GITHUB_ENV
          echo "LD=$TOOLCHAIN/bin/ld.lld" >> $GITHUB_ENV
          echo "NM=$TOOLCHAIN/bin/llvm-nm" >> $GITHUB_ENV
          echo "RANLIB=$TOOLCHAIN/bin/llvm-ranlib" >> $GITHUB_ENV

          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "✅ Using Clang from SDK/NDK"

      - name: Prepare prefix
        run: mkdir -p "$PREFIX"

      - name: Make build script executable
        run: chmod +x build.sh

      - name: Build Python
        run: |
          export PREFIX="$PREFIX"
          autoconf --version
          ./build.sh

      - name: Show result
        run: |
          ls -lh "$PREFIX/bin" || true
